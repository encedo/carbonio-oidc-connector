name: Build and Release

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'VERSION = ' src/server.py | cut -d'"' -f2)
          BUILD="${VERSION}+build${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "tag=v${BUILD}" >> "$GITHUB_OUTPUT"
          echo "deb=carbonio-oidc-connector_${BUILD}_all.deb" >> "$GITHUB_OUTPUT"
          echo "tar=carbonio-oidc-connector-${BUILD}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build .tar.gz
        run: |
          BUILD="${{ steps.version.outputs.build }}"
          DIST="carbonio-oidc-connector-${BUILD}"
          tar czf "${{ steps.version.outputs.tar }}" \
            --transform "s|^|${DIST}/|" \
            src/*.py \
            nginx/upstream-oidc.conf \
            nginx/backend-oidc.conf \
            systemd/carbonio-oidc.service \
            install.sh \
            uninstall.sh \
            config.json.example

      - name: Build .deb
        run: |
          # Temporarily set the version string to include the build number
          # so build-deb.sh picks it up via the VERSION grep.
          BUILD="${{ steps.version.outputs.build }}"
          sed -i "s/^VERSION = .*/VERSION = \"${BUILD}\"/" src/server.py
          bash build-deb.sh
          # Rename to the expected artifact name
          mv "carbonio-oidc-connector_${BUILD}_all.deb" "${{ steps.version.outputs.deb }}" 2>/dev/null || true

      - name: Sign .deb
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          sudo apt-get install -y dpkg-sig
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          dpkg-sig --sign builder \
            --gpg-options "--batch --yes" \
            "${{ steps.version.outputs.deb }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.build }}
          body: |
            Built automatically from branch `master` on push.

            **Install via .deb:**
            ```
            sudo dpkg -i ${{ steps.version.outputs.deb }}
            sudo editor /opt/zextras/oidc/config.json
            sudo systemctl start carbonio-oidc
            ```

            **Install via tarball:**
            ```
            tar xzf ${{ steps.version.outputs.tar }}
            cd carbonio-oidc-connector-${{ steps.version.outputs.build }}
            sudo bash install.sh
            ```

            **Verify .deb signature:**
            ```
            ar x ${{ steps.version.outputs.deb }} && gpg --verify _gpgbuilder
            ```
          files: |
            ${{ steps.version.outputs.deb }}
            ${{ steps.version.outputs.tar }}
