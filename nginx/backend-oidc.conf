# carbonio-oidc-connector backend locations
# Install path: /opt/zextras/conf/nginx/extensions/backend-oidc.conf
# Owner: zextras:zextras
# Included inside server{} HTTPS block
#
# The OIDC login button is provided by the carbonio-login-ui fork
# (github.com/encedo/carbonio-login-ui) — no sub_filter needed.

# OIDC flow endpoints
location /oidc/ {
    proxy_pass         http://oidc_connector;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
}
