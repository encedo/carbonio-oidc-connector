# carbonio-oidc-connector backend locations + login button injection
# Install path: /opt/zextras/conf/nginx/extensions/backend-oidc.conf
# Owner: zextras:zextras
# Included inside server{} HTTPS block

# OIDC flow endpoints
location /oidc/ {
    proxy_pass         http://oidc_connector;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
}

# Inject OIDC button into login SPA
# ^~ takes priority over Carbonio's regex "location ~/static/(.*)"
location ^~ /static/login/ {
    alias /opt/zextras/web/login/;
    index index.html;
    gzip off;
    etag off;
    if_modified_since off;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;

    # Naglowki bezpieczenstwa (kopiujemy z oryginalu Carbonio)
    add_header Cache-Control "no-cache,must-revalidate,no-transform,max-age=604800";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "sameorigin";
    add_header X-XSS-Protection "1; mode=block";

    sub_filter '</body>'
        '<script>(function(){
function injectBtn(){
  if(document.getElementById("oidc-btn"))return;
  var a=document.createElement("a");
  a.id="oidc-btn";
  a.href="/oidc/authorize";
  a.textContent="\uD83D\uDD11 Login with Encedo HSM";
  a.style.cssText="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:9999;display:inline-block;padding:12px 28px;background:#7C35F0;color:#fff;border-radius:6px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.3px;";
  document.body.appendChild(a);
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",injectBtn);}else{injectBtn();}
})();</script></body>';
    sub_filter_once    on;
    sub_filter_types   text/html;
}
